name: CI

# Roda em pushes e pull requests para as branches principais (e permite disparo manual).
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# Cancela execucoes antigas do mesmo branch/PR quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  backend:
    name: Backend — build + testes (.NET 9)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/src
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore SyncBar.sln

      - name: Build (Release)
        run: dotnet build SyncBar.sln --no-restore --configuration Release -warnaserror

      - name: Testes unitários
        run: dotnet test ../test/SyncBar.Tests --no-build --configuration Release --logger "trx;LogFileName=unit.trx"

      - name: Testes de arquitetura
        run: dotnet test ../test/SyncBar.ArchTests --no-build --configuration Release --logger "trx;LogFileName=arch.trx"

      - name: Testes BDD (Specs)
        run: dotnet test ../test/SyncBar.Specs --no-build --configuration Release --logger "trx;LogFileName=specs.trx"

      - name: Publicar resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/**/TestResults/*.trx
          if-no-files-found: warn

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck + build
        run: npm run build

  docker:
    name: Docker — valida build das imagens
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem da API
        uses: docker/build-push-action@v6
        with:
          context: ./backend/src
          file: ./backend/src/Dockerfile
          push: false
          tags: syncbar-api:ci

      - name: Build imagem do frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: syncbar-frontend:ci
